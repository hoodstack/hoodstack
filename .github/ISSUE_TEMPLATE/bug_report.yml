name: Bug report
description: Something does not behave as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        **Do not report security vulnerabilities here.** Use private reporting -
        see SECURITY.md.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected, and what happened instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a code sample.
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - Robinhood Chain Testnet (46630)
        - Robinhood Chain Mainnet (4663)
        - Not network-related
    validations:
      required: true

  - type: input
    id: error-code
    attributes:
      label: Error code
      description: The HS_* code, if one was returned.
      placeholder: HS_CHAIN_MISMATCH

  - type: input
    id: request-id
    attributes:
      label: Request ID
      description: From the error or response headers. Helps us find the server log.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Package versions, Node version, OS, browser.
    validations:
      required: true

  - type: checkboxes
    id: no-secrets
    attributes:
      label: Confirmation
      options:
        - label: >-
            I have removed API keys, private keys, seed phrases, and other
            credentials from everything pasted above.
          required: true
